appId: com.takawasi.desktop
productName: Takawasi Desktop
copyright: Copyright 2026 takawasi

# No code signing (per design decision: OSS GitHub distribution, tech-savvy audience)
# mac: gatekeeper workaround documented in README and promo page
# win: SmartScreen warning acknowledged — users click "More info" > "Run anyway"

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - node_modules/**/*
  - package.json

extraResources:
  - from: dist/cli
    to: cli
    filter:
      - "**/*"

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  identity: null

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

linux:
  target:
    - target: AppImage
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
